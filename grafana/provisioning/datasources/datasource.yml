apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    access: proxy
    url: timescaledb:5432
    user: postgres
    secureJsonData:
      password: postgres
    jsonData:
      database: telemetry
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    isDefault: true
    editable: true